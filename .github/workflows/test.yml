name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: sanity-check scanner CLI
        run: |
          printf '%s' 'This study aims to examine a critical issue, highlighting its broader landscape.' > /tmp/sample.txt
          python scripts/pattern_scan.py /tmp/sample.txt --suggest